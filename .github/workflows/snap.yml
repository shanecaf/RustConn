name: Snap Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup LXD
        uses: canonical/setup-lxd@main

      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic

      - name: Build Snap
        id: build
        run: |
          snapcraft pack --verbose
          SNAP_FILE=$(ls *.snap)
          echo "snap=$SNAP_FILE" >> $GITHUB_OUTPUT
          echo "Built: $SNAP_FILE"

      - name: Upload Snap artifact
        uses: actions/upload-artifact@v6
        with:
          name: snap-${{ github.ref_name }}
          path: ${{ steps.build.outputs.snap }}

      - name: Publish to Snap Store
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAP_STORE_TOKEN }}
        run: snapcraft upload ${{ steps.build.outputs.snap }} --release edge
