name: Check CLI component versions

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
  workflow_dispatch: # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  issues: write

jobs:
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run CLI version check
        id: check
        run: |
          # Run the script and capture output; allow non-zero exit
          set +e
          OUTPUT=$(./scripts/check-cli-versions.sh 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT"
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          # Save output for issue body (multiline)
          {
            echo "report<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create or update issue if updates available
        if: steps.check.outputs.exit_code == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="CLI version updates available"
          # Check if an open issue with this title already exists
          EXISTING=$(gh issue list --state open --search "$TITLE" --json number --jq '.[0].number // empty')
          BODY="## CLI Version Check Report

          The weekly CLI version check found updates or unreachable endpoints.

          \`\`\`
          ${{ steps.check.outputs.report }}
          \`\`\`

          ### Action Required
          - Run \`./scripts/check-cli-versions.sh\` locally
          - Update pinned versions in \`rustconn-core/src/cli_download/components.rs\`
          - Record changes in CHANGELOG.md

          _Auto-generated by [check-cli-versions workflow](https://github.com/${{ github.repository }}/actions/workflows/check-cli-versions.yml)_"

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
            echo "Updated existing issue #$EXISTING"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label "dependencies"
            echo "Created new issue"
          fi
