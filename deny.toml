# cargo-deny configuration for RustConn
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
]

[advisories]
# cargo-deny v2: vulnerability/unsound/notice fields removed (always error).
# Use `ignore` to suppress specific advisories.
unmaintained = "workspace"
yanked = "warn"
# Transitive dependency advisories with no available fix:
# - RUSTSEC-2023-0071: rsa Marvin Attack — no patched version; pulled by
#   ironrdp (sspi) and spice-client. Not exploitable in our local-client context.
ignore = [
    "RUSTSEC-2023-0071",
    # atomic-polyfill unmaintained — transitive via ironrdp/sspi chain;
    # no upstream update available.
    "RUSTSEC-2023-0089",
    # instant unmaintained — transitive via ironrdp/sspi chain;
    # no upstream update available.
    "RUSTSEC-2024-0384",
    # paste unmaintained — transitive via ironrdp/sspi/cryptoki chain;
    # no upstream update available.
    "RUSTSEC-2024-0436",
    # hickory-proto NSEC3 unbounded loop — transitive via sspi/ironrdp;
    # pinned to 0.25.x, no safe upgrade available.
    "RUSTSEC-2026-0118",
    # hickory-proto O(n²) name compression CPU exhaustion — transitive
    # via sspi/ironrdp; fix requires >=0.26.1, sspi pins 0.25.x.
    "RUSTSEC-2026-0119",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "CC0-1.0",
    "OpenSSL",
    "Unlicense",
    "GPL-3.0-or-later",
    "GPL-3.0",
    "bzip2-1.0.6",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
